name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  merge_group:
  pull_request:
    branches:
      - "**"

env: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
      llm_connections_changed: ${{ steps.filter.outputs.llm_connections }}
    timeout-minutes: 15
    permissions:
      pull-requests: read
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          do_not_skip: '["workflow_dispatch"]'
      - uses: actions/checkout@v4
        with:
          # Recommended for paths-filter action
          # may save additional git fetch roundtrip if
          # merge-base is found within latest N commits
          fetch-depth: 20
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            llm_connections:
              - 'packages/shared/package.json'
              - 'packages/shared/src/server/llm/fetchLLMCompletion.ts'

  lint:
    runs-on: ubuntu-latest
    needs:
      - pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-lint-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-lint-
            ${{ runner.os }}-turbo-
      - name: install dependencies
        run: |
          pnpm i
      - name: Load default env
        run: |
          cp .env.dev.example .env
      - name: lint web
        run: pnpm run lint

  prettier-check:
    runs-on: ubuntu-latest
    needs:
      - pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
        with:
          version: 9.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: install dependencies
        run: |
          pnpm i
      - name: Load default env
        run: |
          cp .env.dev.example .env
      - name: Check formatting on changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
          else
            BASE_SHA=$(git merge-base origin/main HEAD)
          fi

          echo "Checking files changed from $BASE_SHA to HEAD"

          # Get changed files
          CHANGED_FILES=$(git diff --name-only $BASE_SHA HEAD -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.css' | tr '\n' ' ')

          if [ -n "$CHANGED_FILES" ] && [ "$CHANGED_FILES" != " " ]; then
            echo "Files to check: $CHANGED_FILES"
            pnpm prettier --check --experimental-cli $CHANGED_FILES
          else
            echo "No JS/TS/CSS files changed - skipping prettier check"
          fi

  test-docker-build:
    timeout-minutes: 20
    runs-on: hanzo-build
    continue-on-error: true # not in CI gate — stabilizing Docker build
    needs:
      - pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Ensure Docker Compose plugin
        run: |
          if ! docker compose version >/dev/null 2>&1; then
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" \
              -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
            chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
          fi
          docker compose version
      - name: Login to Docker Hub
        continue-on-error: true
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_READ }}
          password: ${{ secrets.DOCKERHUB_TOKEN_READ }}
      - name: Set NEXT_PUBLIC_BUILD_ID
        run: echo "NEXT_PUBLIC_BUILD_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Build and run both images from compose
        run: |
          docker compose --progress plain --verbose -f docker-compose.build.yml build --print > /tmp/bake.json
          docker buildx bake -f /tmp/bake.json
          docker compose --progress plain -f docker-compose.build.yml up -d --wait --wait-timeout 300
      - name: Ensure all services are healthy
        run: |
          docker compose -f docker-compose.build.yml ps
          if docker compose -f docker-compose.build.yml ps | grep -E "(unhealthy|Exit)"; then
            echo "One or more services are unhealthy or exited"
            docker compose -f docker-compose.build.yml logs
            exit 1
          else
            echo "All services are healthy"
          fi
      - name: Check worker health
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:3030/api/health; do sleep 2; done'
      - name: Check server health
        run: |
          timeout 180 bash -c 'until curl -sf http://localhost:3000/api/public/health; do sleep 3; done'
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.build.yml logs --tail=200

  tests-web-sync:
    timeout-minutes: 30
    runs-on: hanzo-build
    needs:
      - pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    name: tests-web-sync (node${{ matrix.node-version }}, pg${{ matrix.postgres-version }})
    strategy:
      matrix:
        node-version: [24]
        postgres-version: [15]
    steps:
      - uses: actions/checkout@v4
      - name: Install golang-migrate with Datastore driver
        run: |
          curl -L https://github.com/hanzoai/migrate/releases/download/v4.19.2/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/bin/migrate
          which migrate
      - uses: pnpm/action-setup@v3
        with:
          version: 9.5.0
      - name: Login to Docker Hub
        continue-on-error: true
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_READ }}
          password: ${{ secrets.DOCKERHUB_TOKEN_READ }}
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: install dependencies
        run: |
          pnpm install
      - name: Load default env
        run: |
          cp .env.dev.example .env
          grep -v -e '^S3_BATCH_EXPORT_ENABLED=' -e '^NEXT_PUBLIC_HANZO_RUN_NEXT_INIT=' .env.dev.example > .env
          echo "HANZO_INGESTION_QUEUE_DELAY_MS=1" >> .env
          echo "HANZO_CACHE_PROMPT_ENABLED=false" >> .env
          echo "HANZO_INGESTION_DATASTORE_WRITE_INTERVAL_MS=1" >> .env
      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Cache Next.js builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('web/**/*.js', 'web/**/*.jsx', 'web/**/*.ts', 'web/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-${{ matrix.node-version }}-
      - name: Ensure Docker Compose plugin
        run: |
          if ! docker compose version >/dev/null 2>&1; then
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" \
              -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
            chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
          fi
          docker compose version
      - name: Run dev containers
        run: |
          docker compose -f docker-compose.dev.yml up -d --wait
          docker compose ps
        env:
          POSTGRES_VERSION: ${{ matrix.postgres-version }}
      - name: Migrate DB
        run: |
          pnpm run db:migrate
          pnpm --filter=shared ds:up
        env:
          DATASTORE_MIGRATION_URL: datastore://localhost:9000
          DATASTORE_URL: http://localhost:8123
          DATASTORE_USER: hanzo
          DATASTORE_PASSWORD: hanzo
          DATASTORE_DB: default
      - name: Create datastore-client wrapper (uses running container)
        run: |
          printf '#!/bin/bash\nshift\nexec docker exec -i hanzo-datastore datastore client "$@"\n' | sudo tee /usr/local/bin/datastore-client
          sudo chmod +x /usr/local/bin/datastore-client
          datastore-client client --user hanzo --password hanzo -q "SELECT 'wrapper-ok'" | grep -q wrapper-ok
      - name: Setup Dev Tables
        run: |
          pnpm --filter=shared ds:dev-tables
        env:
          DATASTORE_MIGRATION_URL: datastore://localhost:9000
          DATASTORE_URL: http://localhost:8123
          DATASTORE_USER: hanzo
          DATASTORE_PASSWORD: hanzo
          DATASTORE_DB: default
      - name: Verify Dev Tables
        run: |
          docker exec hanzo-datastore datastore client --user hanzo --password hanzo -q "SHOW TABLES" | tee /dev/stderr | grep -q events
      - name: Build
        run: pnpm run build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
      - name: Start Hanzo
        run: (pnpm run start&)
        env:
          INIT_ORG_ID: "seed-org-id"
          INIT_ORG_NAME: "Seed Org"
          INIT_ORG_CLOUD_PLAN: "Team"
          INIT_PROJECT_ID: "7a88fb47-b4e2-43b8-a06c-a5ce950dc53a"
          INIT_PROJECT_NAME: "Seed Project"
          INIT_PROJECT_PUBLIC_KEY: "pk-hz-1234567890"
          INIT_PROJECT_SECRET_KEY: "sk-hz-1234567890"
          INIT_USER_EMAIL: "demo@hanzo.ai"
          INIT_USER_NAME: "Demo User"
          INIT_USER_PASSWORD: "password"
      - name: run test-sync
        working-directory: web
        run: npx cross-env NODE_OPTIONS='--no-experimental-require-module' npx dotenv -e ../.env.test -e ../.env -- npx jest --verbose --runInBand --detectOpenHandles --forceExit --selectProjects sync-server
      - name: run test-client
        working-directory: web
        run: npx cross-env NODE_OPTIONS='--no-experimental-require-module' npx dotenv -e ../.env.test -e ../.env -- npx jest --verbose --runInBand --detectOpenHandles --forceExit --selectProjects client

  tests-web-async:
    timeout-minutes: 30
    runs-on: hanzo-build
    needs:
      - pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    name: tests-web-async (node${{ matrix.node-version }}, pg${{ matrix.postgres-version }}, shard${{ matrix.shard }}/3)
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
        postgres-version: [15]
        deploy-mode: [""]
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - name: Install golang-migrate with Datastore driver
        run: |
          curl -L https://github.com/hanzoai/migrate/releases/download/v4.19.2/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/bin/migrate
          which migrate
      - uses: pnpm/action-setup@v3
        with:
          version: 9.5.0
      - name: Login to Docker Hub
        continue-on-error: true
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_READ }}
          password: ${{ secrets.DOCKERHUB_TOKEN_READ }}
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: install dependencies
        run: |
          pnpm install
      - name: Load default env
        run: |
          cp .env.dev${{ matrix.deploy-mode }}.example .env
          grep -v -e '^S3_BATCH_EXPORT_ENABLED=' -e '^NEXT_PUBLIC_HANZO_RUN_NEXT_INIT=' .env.dev${{ matrix.deploy-mode }}.example > .env
          echo "HANZO_INGESTION_QUEUE_DELAY_MS=1" >> .env
          echo "HANZO_INGESTION_DATASTORE_WRITE_INTERVAL_MS=1" >> .env
          echo "HANZO_TRACE_DELETE_CONCURRENCY=100" >> .env
          echo "ADMIN_API_KEY=admin-api-key" >> .env
          echo "HANZO_EE_LICENSE_KEY=hanzo_ee_test" >> .env
      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Cache Next.js builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/web/.next/cache
          key: ${{ runner.os }}-nextjs-async-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('web/**/*.js', 'web/**/*.jsx', 'web/**/*.ts', 'web/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-async-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-async-${{ matrix.node-version }}-
      - name: Ensure Docker Compose plugin
        run: |
          if ! docker compose version >/dev/null 2>&1; then
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" \
              -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
            chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
          fi
          docker compose version
      - name: Run dev containers
        run: |
          docker compose -f docker-compose.dev${{ matrix.deploy-mode }}.yml up -d --wait
          docker compose ps
        env:
          POSTGRES_VERSION: ${{ matrix.postgres-version }}
      - name: Migrate DB
        run: |
          pnpm run db:migrate
          pnpm --filter=shared ds:up
        env:
          DATASTORE_MIGRATION_URL: datastore://localhost:9000
          DATASTORE_URL: http://localhost:8123
          DATASTORE_USER: hanzo
          DATASTORE_PASSWORD: hanzo
          DATASTORE_DB: default
      - name: Create datastore-client wrapper (uses running container)
        if: matrix.deploy-mode == ''
        run: |
          printf '#!/bin/bash\nshift\nexec docker exec -i hanzo-datastore datastore client "$@"\n' | sudo tee /usr/local/bin/datastore-client
          sudo chmod +x /usr/local/bin/datastore-client
          datastore-client client --user hanzo --password hanzo -q "SELECT 'wrapper-ok'" | grep -q wrapper-ok
      - name: Setup Dev Tables
        if: matrix.deploy-mode == ''
        run: |
          pnpm --filter=shared ds:dev-tables
      - name: Verify Dev Tables
        if: matrix.deploy-mode == ''
        run: |
          docker exec hanzo-datastore datastore client --user hanzo --password hanzo -q "SHOW TABLES" | tee /dev/stderr | grep -q events
      - name: Build
        run: pnpm run build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
      - name: Start Hanzo
        run: (pnpm run start&)
        env:
          INIT_ORG_ID: "seed-org-id"
          INIT_ORG_NAME: "Seed Org"
          INIT_ORG_CLOUD_PLAN: "Team"
          INIT_PROJECT_ID: "7a88fb47-b4e2-43b8-a06c-a5ce950dc53a"
          INIT_PROJECT_NAME: "Seed Project"
          INIT_PROJECT_PUBLIC_KEY: "pk-hz-1234567890"
          INIT_PROJECT_SECRET_KEY: "sk-hz-1234567890"
          INIT_USER_EMAIL: "demo@hanzo.ai"
          INIT_USER_NAME: "Demo User"
          INIT_USER_PASSWORD: "password"
      - name: run tests
        working-directory: web
        run: npx cross-env NODE_OPTIONS='--no-experimental-require-module' npx dotenv -e ../.env.test -e ../.env -- npx jest --verbose --runInBand --detectOpenHandles --forceExit --selectProjects async-server --shard=${{ matrix.shard }}/3

  tests-worker:
    timeout-minutes: 20
    runs-on: hanzo-build
    needs:
      - pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    name: tests-worker (node${{ matrix.node-version }}, pg${{ matrix.postgres-version }})
    strategy:
      matrix:
        node-version: [24]
        postgres-version: [15]
        deploy-mode: [""]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.5.0
      - name: Login to Docker Hub
        continue-on-error: true
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_READ }}
          password: ${{ secrets.DOCKERHUB_TOKEN_READ }}
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: install dependencies
        run: |
          pnpm install
      - name: Install golang-migrate with Datastore driver
        run: |
          curl -L https://github.com/hanzoai/migrate/releases/download/v4.19.2/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/bin/migrate
          which migrate
      - name: Load default env
        run: |
          cp .env.dev${{ matrix.deploy-mode }}.example .env
          cp .env.dev${{ matrix.deploy-mode }}.example web/.env
          cp .env.dev${{ matrix.deploy-mode }}.example worker/.env
      - name: Ensure Docker Compose plugin
        run: |
          if ! docker compose version >/dev/null 2>&1; then
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" \
              -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
            chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
          fi
          docker compose version
      - name: Run + migrate
        run: |
          docker compose -f docker-compose.dev${{ matrix.deploy-mode }}.yml up -d --wait
          docker compose ps
      - name: Ensure no unhealthy status
        run: |
          if docker compose ps | grep "(unhealthy)"; then
            echo "One or more services are unhealthy"
            exit 1
          else
            echo "All services are healthy"
          fi
      - name: Seed DB
        run: |
          pnpm run db:migrate
          pnpm run db:seed
          pnpm run --filter=shared ds:up
        env:
          DATASTORE_MIGRATION_URL: datastore://localhost:9000
          DATASTORE_URL: http://localhost:8123
          DATASTORE_USER: hanzo
          DATASTORE_PASSWORD: hanzo
          DATASTORE_DB: default
      - name: Create datastore-client wrapper (uses running container)
        if: matrix.deploy-mode == ''
        run: |
          printf '#!/bin/bash\nshift\nexec docker exec -i hanzo-datastore datastore client "$@"\n' | sudo tee /usr/local/bin/datastore-client
          sudo chmod +x /usr/local/bin/datastore-client
          datastore-client client --user hanzo --password hanzo -q "SELECT 'wrapper-ok'" | grep -q wrapper-ok
      - name: Setup Dev Tables
        if: matrix.deploy-mode == ''
        run: |
          pnpm --filter=shared ds:dev-tables
        env:
          DATASTORE_MIGRATION_URL: datastore://localhost:9000
          DATASTORE_URL: http://localhost:8123
          DATASTORE_USER: hanzo
          DATASTORE_PASSWORD: hanzo
          DATASTORE_DB: default
      - name: Verify Dev Tables
        if: matrix.deploy-mode == ''
        run: |
          docker exec hanzo-datastore datastore client --user hanzo --password hanzo -q "SHOW TABLES" | tee /dev/stderr | grep -q events
      - name: Build
        run: pnpm --filter=worker... run build
      - name: run tests
        run: pnpm --filter=worker run test:exclude-llm-connections

  test-worker-llm-connections:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs:
      - pre-job
    if: startsWith(github.ref, 'refs/tags/') || (needs.pre-job.outputs.should_skip != 'true' && (needs.pre-job.outputs.llm_connections_changed == 'true' || github.event_name == 'workflow_dispatch'))
    name: test-worker-llm-connections (node24, pg15)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.5.0
      - name: Login to Docker Hub
        continue-on-error: true
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_READ }}
          password: ${{ secrets.DOCKERHUB_TOKEN_READ }}
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: install dependencies
        run: |
          pnpm install
      - name: Install golang-migrate with Datastore driver
        run: |
          curl -L https://github.com/hanzoai/migrate/releases/download/v4.19.2/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/bin/migrate
          which migrate
      - name: Load default env
        run: |
          cp .env.dev.example .env
          cp .env.dev.example web/.env
          cp .env.dev.example worker/.env
      - name: Run + migrate
        run: |
          docker compose -f docker-compose.dev.yml up -d --wait
          docker compose ps
        env:
          POSTGRES_VERSION: 15
      - name: Ensure no unhealthy status
        run: |
          if docker compose ps | grep "(unhealthy)"; then
            echo "One or more services are unhealthy"
            exit 1
          else
            echo "All services are healthy"
          fi
      - name: Seed DB
        run: |
          pnpm run db:migrate
          pnpm run db:seed
          pnpm run --filter=shared ds:up
      - name: Build
        run: pnpm --filter=worker... run build
      - name: Fetch LLM API key from KMS
        id: kms-secrets
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          KMS_URL: ${{ secrets.KMS_URL }}
          KMS_CLIENT_ID: ${{ secrets.KMS_CLIENT_ID }}
          KMS_CLIENT_SECRET: ${{ secrets.KMS_CLIENT_SECRET }}
        run: |
          ACCESS_TOKEN="$(
            curl -fsS -X POST "${KMS_URL}/api/v1/auth/universal-auth/login" \
              -H "Content-Type: application/json" \
              -d "$(jq -nc --arg cid "$KMS_CLIENT_ID" --arg cs "$KMS_CLIENT_SECRET" \
                    '{clientId: $cid, clientSecret: $cs}')" \
            | jq -r '.accessToken'
          )"
          [ -n "${ACCESS_TOKEN}" ] && [ "${ACCESS_TOKEN}" != "null" ] || {
            echo "::error::Failed to authenticate to Hanzo KMS"; exit 1; }

          HANZO_LLM_API_KEY="$(
            curl -fsS "${KMS_URL}/api/v3/secrets/raw/HANZO_LLM_API_KEY?workspaceSlug=gitops&environment=prod&secretPath=/ci&viewSecretValue=true&include_imports=true" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            | jq -r '.secret.secretValue'
          )"
          echo "::add-mask::${HANZO_LLM_API_KEY}"
          echo "HANZO_LLM_API_KEY=${HANZO_LLM_API_KEY}" >> "$GITHUB_ENV"
      - name: run llm connection tests
        run: pnpm --filter=worker run test:llm-connections-only
        env:
          HANZO_LLM_API_KEY: ${{ env.HANZO_LLM_API_KEY }}
          HANZO_LLM_CONNECTION_OPENAI_KEY: ${{ secrets.HANZO_LLM_CONNECTION_OPENAI_KEY }}
          HANZO_LLM_CONNECTION_ANTHROPIC_KEY: ${{ secrets.HANZO_LLM_CONNECTION_ANTHROPIC_KEY }}

  e2e-tests:
    runs-on: hanzo-build
    continue-on-error: true # not in CI gate — stabilizing Playwright tests
    needs:
      - pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: Login to Docker Hub
        continue-on-error: true
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_READ }}
          password: ${{ secrets.DOCKERHUB_TOKEN_READ }}
      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-e2e-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-e2e-
            ${{ runner.os }}-turbo-
      - name: Cache Next.js builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/web/.next/cache
          key: ${{ runner.os }}-nextjs-e2e-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('web/**/*.js', 'web/**/*.jsx', 'web/**/*.ts', 'web/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-e2e-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-e2e-
      - name: install dependencies
        run: |
          pnpm install
      - name: Load default env
        run: |
          cp .env.dev.example .env
          cp .env.dev.example web/.env
      - name: Install golang-migrate with Datastore driver
        run: |
          curl -L https://github.com/hanzoai/migrate/releases/download/v4.19.2/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/bin/migrate
          which migrate
      - name: Ensure Docker Compose plugin
        run: |
          if ! docker compose version >/dev/null 2>&1; then
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" \
              -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
            chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
          fi
          docker compose version
      - name: Run + migrate
        run: |
          docker compose -f docker-compose.dev.yml up -d --wait
          docker compose ps
      - name: Ensure Docker dependencies are healthy
        run: |
          if docker compose ps | grep "(unhealthy)"; then
            echo "One or more services are unhealthy"
            exit 1
          else
            echo "All services are healthy"
          fi
      - name: Seed DB
        run: |
          pnpm run db:migrate
          pnpm --filter=shared run ds:up
          pnpm run db:seed
      - name: Build
        run: pnpm run build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
      - name: Install playwright
        run: pnpm --filter=web exec playwright install --with-deps
      - name: Run e2e tests
        run: pnpm --filter=web run test:e2e

  e2e-server-tests:
    runs-on: hanzo-build
    continue-on-error: true # not in CI gate — stabilizing worker health + server tests
    needs:
      - pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        continue-on-error: true
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_READ }}
          password: ${{ secrets.DOCKERHUB_TOKEN_READ }}
      - uses: pnpm/action-setup@v3
        with:
          version: 9.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: install dependencies
        run: |
          pnpm install
      - name: Install golang-migrate with Datastore driver
        run: |
          curl -L https://github.com/hanzoai/migrate/releases/download/v4.19.2/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/bin/migrate
          which migrate
      - name: Load default env
        run: |
          cp .env.dev.example .env
      - name: Ensure Docker Compose plugin
        run: |
          if ! docker compose version >/dev/null 2>&1; then
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" \
              -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
            chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
          fi
          docker compose version
      - name: Run + migrate
        run: |
          docker compose -f docker-compose.dev.yml up -d --wait
          docker compose ps
      - name: Ensure Docker dependencies are healthy
        run: |
          if docker compose ps | grep "(unhealthy)"; then
            echo "One or more services are unhealthy"
            exit 1
          else
            echo "All services are healthy"
          fi
      - name: Seed DB
        run: |
          pnpm run db:migrate
          pnpm --filter=shared run ds:up
          pnpm run db:seed:examples
      - name: Build
        run: pnpm run build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
      - name: Copy standalone static assets
        run: |
          # Next.js standalone output excludes static assets and public dir.
          # They must be copied into the standalone tree for the server to serve them.
          WEB_SERVER=$(find web/.next/standalone -name 'server.js' -path '*/web/server.js' -not -path '*/node_modules/*' | head -1)
          STANDALONE_WEB_DIR=$(dirname "$WEB_SERVER")
          cp -r web/.next/static "$STANDALONE_WEB_DIR/.next/static"
          cp -r web/public "$STANDALONE_WEB_DIR/public" 2>/dev/null || true
          echo "Static assets copied to $STANDALONE_WEB_DIR"
      - name: Start web and worker
        run: |
          WEB_SERVER=$(find web/.next/standalone -name 'server.js' -path '*/web/server.js' -not -path '*/node_modules/*' | head -1)
          echo "Starting standalone server: $WEB_SERVER"
          npx dotenv -e .env -- sh -c "HOSTNAME=0.0.0.0 NEXT_MANUAL_SIG_HANDLE=true node $WEB_SERVER" > /tmp/web.log 2>&1 &
          # HOSTNAME must be 0.0.0.0 — the CI runner pod hostname is not localhost-reachable
          npx dotenv -e .env -- sh -c "HOSTNAME=0.0.0.0 node worker/dist/index.js" > /tmp/worker.log 2>&1 &
      - name: Check worker health
        run: |
          timeout 180 bash -c 'until curl -sf http://localhost:3030/api/health; do sleep 3; done' || {
            echo "Worker health check failed. Worker logs:"
            cat /tmp/worker.log || true
            exit 1
          }
      - name: Check server health
        run: |
          timeout 180 bash -c 'until curl -sf http://localhost:3000/api/public/health; do sleep 3; done' || {
            echo "Web server health check failed. Web logs:"
            cat /tmp/web.log || true
            exit 1
          }
      - name: Run e2e tests
        run: pnpm --filter=web run test:e2e:server

  all-ci-passed:
    # This allows us to have a branch protection rule for tests and deploys with matrix.
    # Jobs not in this list still run but use continue-on-error so they don't block merging.
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        prettier-check,
        tests-web-sync,
        # tests-worker, # Disabled - HTTP 414 URI Too Long in blob storage tests
        # test-worker-llm-connections, # Disabled - needs HANZO_LLM_API_KEY in KMS gitops /ci path
        tests-web-async,
        # Jobs below run with continue-on-error (not gating):
        # e2e-tests - Playwright tests (stabilizing standalone server + auth flows)
        # e2e-server-tests - Worker health check (HOSTNAME fix applied, needs verification)
        # test-docker-build - Docker build (@hanzo/ui navigation stubs fix applied)
      ]
    if: always()
    outputs:
      success: ${{ steps.set-success-output.outputs.success }}
    steps:
      - name: Set check result as an output
        id: set-success-output
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "success=false" >> $GITHUB_OUTPUT
          else
            echo "success=true" >> $GITHUB_OUTPUT
          fi
      - name: Successful deploy
        if: ${{ !(contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: exit 0
        working-directory: .
      - name: Failing deploy
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
        working-directory: .
      - name: Notify Slack
        uses: ravsamhq/notify-slack-action@v2
        if: always() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        with:
          status: ${{ job.status }}
          notify_when: "failure"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: Output job results
        run: |
          echo "Job results: ${{ steps.set-success-output.outputs.success }}"

  push-docker-image:
    needs: all-ci-passed
    # if something inside all-ci-passed was skipped, but everything that ran passed, we still want to deploy
    if: always() && needs.all-ci-passed.outputs.success == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment: "protected branches"
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: pnpm/action-setup@v3
        with:
          version: 9.5.0
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache-dependency-path: "pnpm-lock.yaml"
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set NEXT_PUBLIC_BUILD_ID
        run: echo "NEXT_PUBLIC_BUILD_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Extract metadata (tags, labels) for Docker
        id: meta-web
        uses: docker/metadata-action@v4
        with:
          images: |
            ghcr.io/hanzoai/cloud # GitHub
            hanzoai/cloud # Docker Hub
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref, '-rc') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-rc') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v3') && !contains(github.ref, '-rc') }}
      - name: Build and push Docker image (web)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          platforms: |
            linux/amd64
            ${{ startsWith(github.ref, 'refs/tags/') && 'linux/arm64' || '' }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta-worker
        uses: docker/metadata-action@v4
        with:
          images: |
            ghcr.io/hanzoai/cloud-worker # GitHub
            hanzoai/cloud-worker # Docker Hub
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref, '-rc') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-rc') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v3') && !contains(github.ref, '-rc') }}
      - name: Build and push Docker image (worker)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./worker/Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          platforms: |
            linux/amd64
            ${{ startsWith(github.ref, 'refs/tags/') && 'linux/arm64' || '' }}
      - name: Notify Slack
        uses: ravsamhq/notify-slack-action@v2
        if: always()
        with:
          status: ${{ job.status }}
          notify_when: "failure"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
