name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Recreate views with all missing columns
        run: |
          echo "=== Drop and recreate events_core ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 \
            --post-data="DROP VIEW IF EXISTS console.events_core" \
            "http://hanzo-datastore:8123/" 2>&1
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 \
            --post-data="DROP VIEW IF EXISTS console.events_full" \
            "http://hanzo-datastore:8123/" 2>&1
          
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 \
            --post-data="CREATE VIEW console.events_core AS SELECT *, id AS span_id, parent_observation_id AS parent_span_id, '' AS user_id, '' AS session_id, '' AS trace_name, '' AS release, CAST([] AS Array(String)) AS tags, '' AS experiment_id, '' AS experiment_dataset_id, '' AS model_id, mapKeys(metadata) AS metadata_names, mapValues(metadata) AS metadata_values FROM console.observations" \
            "http://hanzo-datastore:8123/" 2>&1
          echo "events_core: $?"

          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 \
            --post-data="CREATE VIEW console.events_full AS SELECT *, id AS span_id, parent_observation_id AS parent_span_id, '' AS user_id, '' AS session_id, '' AS trace_name, '' AS release, CAST([] AS Array(String)) AS tags, '' AS experiment_id, '' AS experiment_dataset_id, '' AS model_id, mapKeys(metadata) AS metadata_names, mapValues(metadata) AS metadata_values FROM console.observations" \
            "http://hanzo-datastore:8123/" 2>&1
          echo "events_full: $?"

          echo ""
          echo "=== Test ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 \
            "http://hanzo-datastore:8123/?database=console&query=SELECT+experiment_id,model_id,span_id,user_id+FROM+events_core+LIMIT+1" 2>&1 || echo "FAILED"
