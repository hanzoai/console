name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Delete and restart Datastore pod
        run: |
          echo "=== Current status ==="
          kubectl get pod datastore-0 -n hanzo -o wide 2>&1

          echo ""
          echo "=== Deleting crashed pod ==="
          kubectl delete pod datastore-0 -n hanzo --grace-period=0 --force 2>&1
          echo "Pod deleted, waiting for StatefulSet to recreate..."

          echo ""
          echo "=== Waiting for new pod to start (up to 120s) ==="
          for i in $(seq 1 24); do
            sleep 5
            STATUS=$(kubectl get pod datastore-0 -n hanzo -o jsonpath='{.status.phase}' 2>/dev/null)
            READY=$(kubectl get pod datastore-0 -n hanzo -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null)
            RESTARTS=$(kubectl get pod datastore-0 -n hanzo -o jsonpath='{.status.containerStatuses[0].restartCount}' 2>/dev/null)
            echo "  [${i}] Phase=$STATUS Ready=$READY Restarts=$RESTARTS"
            if [ "$READY" = "true" ]; then
              echo "Datastore is READY!"
              break
            fi
            if [ "$RESTARTS" -gt 1 ] 2>/dev/null; then
              echo "Pod is crash-looping again. Getting logs..."
              kubectl logs datastore-0 -n hanzo --previous --tail=30 2>&1
              echo ""
              echo "=== Error log from inside pod ==="
              kubectl exec -n hanzo datastore-0 -- cat /var/log/hanzo-datastore-server/hanzo-datastore-server.err.log 2>&1 | tail -30 || echo "Can't exec into pod"
              break
            fi
          done

          echo ""
          echo "=== Final status ==="
          kubectl get pod datastore-0 -n hanzo -o wide 2>&1

          echo ""
          echo "=== Test connectivity ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://datastore:8123/?query=SELECT+1" 2>&1 || echo "Datastore still unreachable"
