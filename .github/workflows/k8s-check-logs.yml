name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix KMS and static
        run: |
          echo "=== Fix KMS: use internal URL ==="
          kubectl set env deploy/console -n hanzo "KMS_API_URL=http://kms.hanzo.svc:80"
          kubectl set env deploy/console-worker -n hanzo "KMS_API_URL=http://kms.hanzo.svc:80" 2>/dev/null || true
          
          echo ""
          echo "=== Test KMS internally ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://kms.hanzo.svc:80/api/status" 2>&1 | head -3 || echo "KMS internal test failed"
          
          echo ""
          echo "=== Fix static.hanzo.ai: check wildcard ==="
          CF_ZONE="bac51c3900e73fd28aa75a59898bcee0"
          CF_EMAIL=$(kubectl get secret cloudflare-api-credentials -n hanzo -o jsonpath='{.data.email}' | base64 -d)
          CF_KEY=$(kubectl get secret cloudflare-api-credentials -n hanzo -o jsonpath='{.data.api-key}' | base64 -d)
          
          # List all records matching static
          curl -s -H "X-Auth-Email: $CF_EMAIL" -H "X-Auth-Key: $CF_KEY" \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records?name=static.hanzo.ai" | \
            grep -o '"id":"[^"]*"\|"type":"[^"]*"\|"content":"[^"]*"\|"proxied":[^,]*' | head -8
          
          echo ""
          echo "--- Wildcard record ---"
          curl -s -H "X-Auth-Email: $CF_EMAIL" -H "X-Auth-Key: $CF_KEY" \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records?type=A&name=*.hanzo.ai" | \
            grep -o '"id":"[^"]*"\|"name":"[^"]*"\|"content":"[^"]*"\|"proxied":[^,]*' | head -8

          echo ""
          echo "=== Restart console to pick up new KMS URL ==="
          kubectl rollout restart deploy/console -n hanzo
