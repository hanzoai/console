name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Pull new image and restart
        run: |
          echo "=== Restart to pull latest image ==="
          kubectl rollout restart deploy/console -n hanzo 2>&1
          kubectl rollout restart deploy/console-worker -n hanzo 2>&1 || true
          
          echo ""
          echo "=== Wait ==="
          kubectl rollout status deploy/console -n hanzo --timeout=180s 2>&1 || echo "Timed out"
          
          echo ""
          echo "=== Verify new image ==="
          kubectl get pods -n hanzo -l app=console -o jsonpath='{range .items[0]}{.status.containerStatuses[0].imageID}{end}' 2>&1
          echo ""
          
          echo ""
          echo "=== Check for errors ==="
          sleep 5
          POD=$(kubectl get pods -n hanzo -l app=console --sort-by=.metadata.creationTimestamp -o name | tail -1)
          kubectl logs "$POD" -n hanzo --tail=20 2>&1 | grep -i "error\|DB::Exception" | head -5 || echo "No errors"
