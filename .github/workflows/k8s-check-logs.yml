name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Get environmentFilterOptions error from logs
        run: |
          echo "=== Console pod logs with environmentFilterOptions errors ==="
          for POD in $(kubectl get pods -n hanzo -l app=console -o name); do
            echo "--- $POD ---"
            kubectl logs "$POD" -n hanzo --tail=200 2>&1 | grep -i -A5 "environmentFilter\|INTERNAL_SERVER_ERROR\|trpc.*error\|ClickHouse\|Code: \|DB::Exception" | head -30
            echo ""
          done

          echo ""
          echo "=== Test the ClickHouse query directly ==="
          kubectl exec -n hanzo datastore-0 -- clickhouse-client --query "SELECT name FROM system.tables WHERE database='insights' AND name LIKE '%environment%'" 2>&1 || \
          kubectl exec -n hanzo datastore-0 -- hanzo-datastore client --query "SELECT name FROM system.tables WHERE database='insights' AND name LIKE '%environment%'" 2>&1 || \
          echo "Can't query ClickHouse directly"

          echo ""
          echo "=== List all tables in insights DB ==="
          kubectl exec -n hanzo datastore-0 -- wget -q -O - "http://localhost:8123/?query=SHOW+TABLES+FROM+insights" 2>&1 | head -30
