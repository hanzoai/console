name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Get exact error
        run: |
          echo "=== Latest environmentFilterOptions errors ==="
          POD=$(kubectl get pods -n hanzo -l app=console -o name | head -1)
          kubectl logs "$POD" -n hanzo --tail=200 2>&1 | grep -B1 -A3 "environmentFilter\|INTERNAL_SERVER_ERROR\|DB::Exception\|BAD_QUERY" | head -30
          
          echo ""
          echo "=== Check build ID ==="
          kubectl exec -n hanzo "$POD" -- env 2>&1 | grep "BUILD_ID\|NEXT_PUBLIC_BUILD" || echo "No build ID"
          
          echo ""
          echo "=== Image digest ==="
          kubectl get "$POD" -n hanzo -o jsonpath='{.status.containerStatuses[0].imageID}'
          echo ""
