name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Enable CH migrations and restart
        run: |
          echo "=== Enable auto migrations ==="
          kubectl set env deploy/console -n hanzo "DATASTORE_AUTO_MIGRATION_DISABLED=false" 2>&1
          kubectl set env deploy/console-worker -n hanzo "DATASTORE_AUTO_MIGRATION_DISABLED=false" 2>&1 || true

          echo ""
          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/console -n hanzo --timeout=180s 2>&1 || echo "Rollout timed out (may still be in progress)"

          echo ""
          echo "=== Check worker logs for migration activity ==="
          sleep 10
          WORKER=$(kubectl get pods -n hanzo -l app=console-worker -o name 2>/dev/null | head -1)
          if [ -n "$WORKER" ]; then
            kubectl logs "$WORKER" -n hanzo --tail=50 2>&1 | grep -i "migration\|events_core\|table\|create\|alter" | head -20
          fi

          echo ""
          echo "=== Check if events_core now exists ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://datastore:8123/?database=console&query=SHOW+TABLES" 2>&1

          echo ""
          echo "=== Test environmentFilterOptions query directly ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://datastore:8123/?database=console&query=SELECT+1+FROM+traces+LIMIT+1" 2>&1 || echo "traces query failed"
