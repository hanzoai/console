name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Read error log from debug container
        run: |
          echo "=== Scale down StatefulSet ==="
          kubectl scale statefulset datastore -n hanzo --replicas=0 2>&1
          sleep 10

          echo ""
          echo "=== Run debug pod with same PVC ==="
          cat <<'MANIFEST' | kubectl apply -n hanzo -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: datastore-debug
          spec:
            tolerations:
            - key: dedicated
              operator: Equal
              value: ci-runner
              effect: NoSchedule
            containers:
            - name: debug
              image: alpine:3.19
              command: ["sleep", "300"]
              volumeMounts:
              - name: data
                mountPath: /data
            volumes:
            - name: data
              persistentVolumeClaim:
                claimName: datastore-data-datastore-0
            imagePullSecrets:
            - name: ghcr-secret
          MANIFEST

          echo "Waiting for debug pod..."
          kubectl wait --for=condition=Ready pod/datastore-debug -n hanzo --timeout=60s 2>&1

          echo ""
          echo "=== Error log file ==="
          kubectl exec -n hanzo datastore-debug -- cat /data/log/hanzo-datastore-server/hanzo-datastore-server.err.log 2>&1 | tail -50 || \
          kubectl exec -n hanzo datastore-debug -- find /data -name "*.err.log" -o -name "*.log" 2>&1 | head -20

          echo ""
          echo "=== Check disk usage ==="
          kubectl exec -n hanzo datastore-debug -- df -h /data 2>&1

          echo ""
          echo "=== Data directory listing ==="
          kubectl exec -n hanzo datastore-debug -- ls -la /data/ 2>&1

          echo ""
          echo "=== Status file ==="
          kubectl exec -n hanzo datastore-debug -- cat /data/status 2>&1 || echo "No status file"

          echo ""
          echo "=== Cleanup: delete debug pod, scale back up ==="
          kubectl delete pod datastore-debug -n hanzo --grace-period=0 --force 2>&1
          kubectl scale statefulset datastore -n hanzo --replicas=1 2>&1
          echo "Done. Datastore will restart."
