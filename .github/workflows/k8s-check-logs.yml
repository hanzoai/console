name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix events views with correct columns
        run: |
          echo "=== Drop old views ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 \
            --post-data="DROP VIEW IF EXISTS console.events_core" \
            "http://hanzo-datastore:8123/" 2>&1
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 \
            --post-data="DROP VIEW IF EXISTS console.events_full" \
            "http://hanzo-datastore:8123/" 2>&1

          echo ""
          echo "=== Create events_core with correct column aliases ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 \
            --post-data="CREATE VIEW console.events_core AS SELECT *, id AS span_id, parent_observation_id AS parent_span_id, '' AS user_id, '' AS session_id, '' AS trace_name, '' AS release, '' AS environment, [] AS tags FROM console.observations" \
            "http://hanzo-datastore:8123/" 2>&1
          echo "events_core: $?"

          echo ""
          echo "=== Create events_full with correct column aliases ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 \
            --post-data="CREATE VIEW console.events_full AS SELECT *, id AS span_id, parent_observation_id AS parent_span_id, '' AS user_id, '' AS session_id, '' AS trace_name, '' AS release, '' AS environment, [] AS tags FROM console.observations" \
            "http://hanzo-datastore:8123/" 2>&1
          echo "events_full: $?"

          echo ""
          echo "=== Verify columns ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 \
            "http://hanzo-datastore:8123/?database=console&query=SELECT+name+FROM+system.columns+WHERE+table='events_core'+AND+database='console'+ORDER+BY+name" 2>&1

          echo ""
          echo "=== Test query with user_id ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 \
            "http://hanzo-datastore:8123/?database=console&query=SELECT+user_id,+trace_name,+span_id,+parent_span_id+FROM+events_core+LIMIT+1" 2>&1 || echo "FAILED"
