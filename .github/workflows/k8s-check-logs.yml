name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check Datastore config and connectivity
        run: |
          echo "=== Console Datastore env vars ==="
          kubectl exec -n hanzo deploy/console -- env | grep -iE 'CLICK|DATASTORE|CH_' | sort

          echo ""
          echo "=== Test Datastore connectivity from console pod ==="
          CH_URL=$(kubectl exec -n hanzo deploy/console -- printenv CLICKHOUSE_URL 2>/dev/null)
          echo "CLICKHOUSE_URL: $CH_URL"

          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "${CH_URL}/?query=SELECT+1" 2>&1 || echo "Datastore connection FAILED"

          echo ""
          echo "=== Check if tables exist ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "${CH_URL}/?query=SHOW+TABLES" 2>&1 | head -20 || echo "Cannot list tables"

          echo ""
          echo "=== Console env: ENCRYPTION_KEY ==="
          kubectl exec -n hanzo deploy/console -- env | grep -iE 'ENCRYPTION' | sed 's/=.*/=***/'
