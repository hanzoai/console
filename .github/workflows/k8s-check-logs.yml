name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Check bot services
        run: |
          echo "=== Bot-related pods ==="
          kubectl get pods -n hanzo | grep -i "bot\|gateway\|hub"
          echo ""
          echo "=== Bot-related services ==="
          kubectl get svc -n hanzo | grep -i "bot\|gateway\|hub"
          echo ""
          echo "=== Bot-related ingress ==="
          kubectl get ingress -n hanzo | grep -i "bot\|hub\|app.hanzo"
          echo ""
          echo "=== Bot-hub deployment ==="
          kubectl get deploy bot-hub -n hanzo -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null
          echo ""
          echo "=== Bot-gateway deployment ==="
          kubectl get deploy bot-gateway -n hanzo -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "No bot-gateway deploy"
          echo ""
          echo "=== Bot-hub pod logs ==="
          kubectl logs -n hanzo -l app=bot-hub --tail=10 2>/dev/null | head -10 || echo "No bot-hub logs"
