name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Get fresh errors
        run: |
          echo "=== ALL pod errors (last 100 lines each) ==="
          for POD in $(kubectl get pods -n hanzo -l app=console -o name); do
            echo "--- $POD ---"
            kubectl logs "$POD" -n hanzo --tail=100 2>&1 | grep -i "DB::Exception\|Code:\|UNKNOWN_IDENTIFIER\|Missing column\|error.*Datastore\|non-retryable" | head -5
          done
