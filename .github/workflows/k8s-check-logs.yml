name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check current errors
        run: |
          echo "=== Latest console errors ==="
          POD=$(kubectl get pods -n hanzo -l app=console --sort-by=.metadata.creationTimestamp -o name | tail -1)
          kubectl logs "$POD" -n hanzo --tail=50 2>&1 | grep -i "error\|DB::Exception\|Code:" | head -20

          echo ""
          echo "=== Current DATASTORE env ==="
          kubectl exec "$POD" -n hanzo -- env 2>&1 | grep -E "^DATASTORE_URL=|^CLICKHOUSE_URL=" | sort
