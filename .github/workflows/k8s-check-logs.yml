name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check Datastore pods and services
        run: |
          echo "=== Datastore pods ==="
          kubectl get pods -n hanzo | grep -i datastore || echo "No datastore pods found"

          echo ""
          echo "=== Datastore service ==="
          kubectl get svc -n hanzo | grep -i datastore || echo "No datastore service found"

          echo ""
          echo "=== Datastore pod status ==="
          kubectl get pods -n hanzo -l app=datastore -o wide 2>/dev/null || \
          kubectl get pods -n hanzo | grep datastore

          echo ""
          echo "=== Datastore pod logs ==="
          DS_POD=$(kubectl get pods -n hanzo | grep datastore | head -1 | awk '{print $1}')
          if [ -n "$DS_POD" ]; then
            kubectl logs "$DS_POD" -n hanzo --tail=20 2>&1
          else
            echo "No datastore pod to check logs"
          fi

          echo ""
          echo "=== Test direct IP connectivity ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=3 "http://10.124.34.223:8123/?query=SELECT+1" 2>&1 || echo "Direct IP also failed"

          echo ""
          echo "=== Datastore endpoints ==="
          kubectl get endpoints -n hanzo datastore 2>/dev/null || echo "No datastore endpoints"
