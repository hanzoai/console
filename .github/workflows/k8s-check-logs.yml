name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check deployed vs latest image
        run: |
          echo "=== Currently deployed console image ==="
          kubectl get deploy console -n hanzo -o jsonpath='{.spec.template.spec.containers[0].image}' 2>&1
          echo ""

          echo ""
          echo "=== Currently deployed console-worker image ==="
          kubectl get deploy console-worker -n hanzo -o jsonpath='{.spec.template.spec.containers[0].image}' 2>&1
          echo ""

          echo ""
          echo "=== Latest image tags on ghcr.io ==="
          # Check what the latest tags are
          CONSOLE_IMG=$(kubectl get deploy console -n hanzo -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "Deployed: $CONSOLE_IMG"

          echo ""
          echo "=== Check ghcr for latest console tags ==="
          # Try to list recent versions
          TOKEN=$(echo '{}' | base64)
          curl -s "https://ghcr.io/v2/hanzoai/cloud-web/tags/list" 2>&1 | head -5 || echo "Can't list tags without auth"

          echo ""
          echo "=== Console deployment details ==="
          kubectl get deploy console -n hanzo -o jsonpath='{.metadata.annotations}' 2>&1 | python3 -m json.tool 2>/dev/null | grep -i "image\|version\|revision" || true

          echo ""
          echo "=== Pod image IDs (shows actual pulled digest) ==="
          kubectl get pods -n hanzo -l app=console -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.containerStatuses[0].imageID}{"\n"}{end}' 2>&1

          echo ""
          echo "=== When was the deployment last updated? ==="
          kubectl get deploy console -n hanzo -o jsonpath='{.metadata.creationTimestamp}' 2>&1
          echo ""
          kubectl rollout history deploy/console -n hanzo 2>&1 | tail -5

          echo ""
          echo "=== Latest ghcr tags via gh CLI ==="
          gh api "orgs/hanzoai/packages/container/cloud-web/versions" --jq '.[0:5] | .[] | "\(.created_at) \(.metadata.container.tags)"' 2>&1 || echo "No access or package not found"

          echo ""
          echo "=== Also check hanzo-cloud-web ==="
          gh api "orgs/hanzoai/packages/container/hanzo-cloud-web/versions" --jq '.[0:5] | .[] | "\(.created_at) \(.metadata.container.tags)"' 2>&1 || echo "Not found"
