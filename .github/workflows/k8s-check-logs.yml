name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Debug nginx ingress for bot
        run: |
          echo "=== Nginx ingress controller pods ==="
          kubectl get pods --all-namespaces | grep -i "nginx\|ingress" | grep -v "cm-acme"

          echo ""
          echo "=== Nginx ingress controller service ==="
          kubectl get svc --all-namespaces | grep -i "nginx\|ingress" | grep -v "cm-acme"

          echo ""
          echo "=== Check if nginx ingress LB has IP 24.199.71.111 ==="
          kubectl get svc --all-namespaces -o json | python3 -c "
import json,sys
data=json.load(sys.stdin)
for svc in data['items']:
  lb = svc.get('status',{}).get('loadBalancer',{}).get('ingress',[])
  for l in lb:
    if l.get('ip') == '24.199.71.111':
      print(f\"FOUND: {svc['metadata']['namespace']}/{svc['metadata']['name']} -> 24.199.71.111\")
" 2>&1 || echo "Not found via API"

          echo ""
          echo "=== hanzo-playground service exists? ==="
          kubectl get svc hanzo-playground -n hanzo 2>&1 || echo "NO hanzo-playground service"

          echo ""
          echo "=== Check cert status for gw.hanzo.bot ==="
          kubectl get certificate -n hanzo 2>/dev/null | grep -i "gw\|bot" || echo "No certs found"
          
          echo ""
          echo "=== Check cert-manager challenges ==="
          kubectl get challenges --all-namespaces 2>/dev/null | head -5 || echo "No challenges"
