name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Deploy amd64 image with fix
        run: |
          echo "=== Deploy ghcr.io/hanzoai/console:main-amd64 ==="
          kubectl set image deploy/console -n hanzo \
            hanzo-web=ghcr.io/hanzoai/console:main-amd64
          kubectl set image deploy/console-worker -n hanzo \
            hanzo-worker=ghcr.io/hanzoai/console-worker:main-amd64 2>/dev/null || true

          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/console -n hanzo --timeout=180s || echo "Timed out"

          echo ""
          echo "=== Verify new image ==="
          kubectl get pods -n hanzo -l app=console -o jsonpath='{.items[0].spec.containers[0].image}'
          echo ""

          echo ""
          echo "=== Check for errors ==="
          sleep 10
          POD=$(kubectl get pods -n hanzo -l app=console --sort-by=.metadata.creationTimestamp -o name | tail -1)
          kubectl logs "$POD" -n hanzo --tail=20 2>&1 | grep -i "error\|exception\|failed" || echo "No errors found"
