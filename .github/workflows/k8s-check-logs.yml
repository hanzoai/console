name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Scale up services and fix DNS
        run: |
          echo "=== 1. Scale up cloud-agent ==="
          kubectl scale deploy/cloud-agent -n hanzo --replicas=1
          
          echo "=== 2. Scale up neon-compute ==="
          kubectl scale deploy/neon-compute -n hanzo --replicas=1
          
          echo "=== 3. Wait for pods ==="
          sleep 30
          kubectl get pods -n hanzo | grep -E "cloud-agent|neon-compute"
          
          echo ""
          echo "=== 4. Check agents connectivity ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://agents:8080/api/health" 2>&1 | head -3 || echo "Agents not ready yet"
          
          echo ""
          echo "=== 5. Check KMS connectivity ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "https://kms.hanzo.ai/api/status" 2>&1 | head -3 || echo "KMS unreachable"
          
          echo ""
          echo "=== 6. Fix static.hanzo.ai DNS ==="
          # Get Cloudflare zone
          CF_ZONE="bac51c3900e73fd28aa75a59898bcee0"
          CF_EMAIL=$(kubectl get secret cloudflare-api-credentials -n hanzo -o jsonpath='{.data.email}' | base64 -d)
          CF_KEY=$(kubectl get secret cloudflare-api-credentials -n hanzo -o jsonpath='{.data.api-key}' | base64 -d)
          
          # Find static.hanzo.ai record
          RECORD=$(curl -s -H "X-Auth-Email: $CF_EMAIL" -H "X-Auth-Key: $CF_KEY" \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records?name=static.hanzo.ai" | \
            python3 -c "import json,sys; r=json.load(sys.stdin); print(r['result'][0]['id'] if r['result'] else 'NOT_FOUND')")
          echo "static.hanzo.ai record: $RECORD"
          
          if [ "$RECORD" != "NOT_FOUND" ]; then
            # Update to CNAME to console.hanzo.ai (proxied through Cloudflare for SSL)
            curl -s -X PATCH -H "X-Auth-Email: $CF_EMAIL" -H "X-Auth-Key: $CF_KEY" \
              -H "Content-Type: application/json" \
              --data '{"type":"CNAME","name":"static","content":"console.hanzo.ai","proxied":true}' \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records/$RECORD" | \
              python3 -c "import json,sys; r=json.load(sys.stdin); print('Updated!' if r.get('success') else r)"
          fi
