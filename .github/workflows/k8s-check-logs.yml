name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Get Datastore crash reason
        run: |
          echo "=== Previous crash logs ==="
          kubectl logs datastore-0 -n hanzo --previous --tail=50 2>&1 || echo "No previous logs"

          echo ""
          echo "=== Pod describe (events) ==="
          kubectl describe pod datastore-0 -n hanzo | tail -30

          echo ""
          echo "=== StatefulSet describe ==="
          kubectl get statefulset -n hanzo | grep datastore

          echo ""
          echo "=== Pod resource usage ==="
          kubectl top pod datastore-0 -n hanzo 2>/dev/null || echo "Metrics not available"

          echo ""
          echo "=== Try reading error log from inside pod ==="
          kubectl exec -n hanzo datastore-0 -- cat /var/log/hanzo-datastore-server/hanzo-datastore-server.err.log 2>&1 | tail -30 || echo "Pod not running, can't exec"

          echo ""
          echo "=== Node resources ==="
          kubectl describe node runner-pool-32g-hwvq3 2>/dev/null | grep -A5 "Allocated resources" || echo "Node info not available"
