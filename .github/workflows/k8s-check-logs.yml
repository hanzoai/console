name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Debug bot ingress
        run: |
          echo "=== bot-gateway-ws ingress details ==="
          kubectl get ingress bot-gateway-ws -n hanzo -o yaml | grep -A 20 "spec:" | head -25
          
          echo ""
          echo "=== hanzo-playground ingress details ==="
          kubectl get ingress hanzo-playground -n hanzo -o yaml | grep -A 20 "spec:" | head -25
          
          echo ""
          echo "=== TLS certs for bot ingresses ==="
          kubectl get ingress -n hanzo -o custom-columns='NAME:.metadata.name,HOSTS:.spec.rules[*].host,TLS:.spec.tls[*].hosts' | grep -i bot
          
          echo ""
          echo "=== Ingress controllers ==="
          kubectl get ingress bot-gateway-ws -n hanzo -o jsonpath='{.metadata.annotations}' | tr ',' '\n'
          
          echo ""
          echo "=== All LB services ==="
          kubectl get svc -n hanzo --field-selector spec.type=LoadBalancer -o custom-columns='NAME:.metadata.name,IP:.status.loadBalancer.ingress[0].ip'
          
          echo ""
          echo "=== bot-gateway pod logs ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=5 2>/dev/null | head -10
