name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check hanzo-datastore and fix console config
        run: |
          echo "=== ClickHouse services in hanzo namespace ==="
          kubectl get svc -n hanzo | grep datastore

          echo ""
          echo "=== hanzo-datastore pods ==="
          kubectl get pods -n hanzo | grep hanzo-datastore

          echo ""
          echo "=== Check hanzo-datastore for events_core table ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-datastore:8123/?query=SHOW+TABLES" 2>&1 | head -30 || echo "hanzo-datastore not reachable on 8123"

          echo ""
          echo "=== Check hanzo-datastore for events_core specifically ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-datastore:8123/?query=SELECT+name+FROM+system.tables+WHERE+name+LIKE+'%25events_core%25'+OR+name+LIKE+'%25traces%25'+OR+name+LIKE+'%25observations%25'" 2>&1 || echo "Query failed"

          echo ""
          echo "=== Current console CLICKHOUSE_URL env ==="
          kubectl exec -n hanzo deploy/console -- env 2>&1 | grep -i "CLICKHOUSE\|DATASTORE\|DATABASE_URL" | head -10

          echo ""
          echo "=== Check if hanzo-datastore has insights DB ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-datastore:8123/?query=SHOW+DATABASES" 2>&1 || echo "Failed"

          echo ""
          echo "=== Also try port 9000 (native) ==="
          kubectl get endpoints -n hanzo hanzo-datastore 2>&1
