name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Restart console pods and verify Datastore
        run: |
          echo "=== Datastore status ==="
          kubectl get pod datastore-0 -n hanzo -o wide 2>&1

          echo ""
          echo "=== Test Datastore connectivity ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://datastore:8123/?query=SELECT+1" 2>&1 || echo "FAILED"

          echo ""
          echo "=== Restart console deployment ==="
          kubectl rollout restart deploy/console -n hanzo 2>&1
          kubectl rollout restart deploy/console-worker -n hanzo 2>&1 || true

          echo ""
          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/console -n hanzo --timeout=120s 2>&1

          echo ""
          echo "=== Test again after restart ==="
          sleep 5
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://datastore:8123/?query=SELECT+1" 2>&1 || echo "STILL FAILED"

          echo ""
          echo "=== Console pod logs (last 10 lines) ==="
          kubectl logs -n hanzo deploy/console --tail=10 2>&1
