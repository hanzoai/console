name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Deploy amd64 image with fix
        run: |
          echo "=== Get container names ==="
          kubectl get deploy console -n hanzo -o jsonpath='{.spec.template.spec.containers[*].name}'
          echo ""

          echo "=== Current image ==="
          kubectl get deploy console -n hanzo -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""

          echo "=== Deploy ghcr.io/hanzoai/console:main-amd64 ==="
          CONTAINER=$(kubectl get deploy console -n hanzo -o jsonpath='{.spec.template.spec.containers[0].name}')
          kubectl set image "deploy/console" -n hanzo \
            "${CONTAINER}=ghcr.io/hanzoai/console:main-amd64"

          # Also update worker
          W_CONTAINER=$(kubectl get deploy console-worker -n hanzo -o jsonpath='{.spec.template.spec.containers[0].name}' 2>/dev/null) || true
          if [ -n "$W_CONTAINER" ]; then
            kubectl set image "deploy/console-worker" -n hanzo \
              "${W_CONTAINER}=ghcr.io/hanzoai/console-worker:main-amd64" 2>/dev/null || true
          fi

          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/console -n hanzo --timeout=180s || echo "Timed out"

          echo ""
          echo "=== Verify new image ==="
          kubectl get pods -n hanzo -l app=console -o jsonpath='{.items[0].spec.containers[0].image}'
          echo ""

          echo ""
          echo "=== Check for errors ==="
          sleep 15
          POD=$(kubectl get pods -n hanzo -l app=console --sort-by=.metadata.creationTimestamp -o name | tail -1)
          kubectl logs "$POD" -n hanzo --tail=20 2>&1 | grep -i "error\|DB::Exception" || echo "No errors found"
