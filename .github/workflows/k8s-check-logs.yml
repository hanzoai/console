name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check console ClickHouse config and create tables
        run: |
          echo "=== Console CLICKHOUSE env vars ==="
          kubectl exec -n hanzo deploy/console -- env 2>&1 | grep -i "CLICKHOUSE\|DATASTORE" || echo "No CLICKHOUSE vars found"

          echo ""
          echo "=== Test datastore service (where console points) ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://datastore:8123/?query=SHOW+DATABASES" 2>&1

          echo ""
          echo "=== Check if default DB has events_core ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://datastore:8123/?query=SELECT+name+FROM+system.tables+WHERE+name+IN+('events_core','traces','observations','scores')" 2>&1

          echo ""
          echo "=== Check ALL databases for events_core ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://datastore:8123/?query=SELECT+database,name+FROM+system.tables+WHERE+name+IN+('events_core','traces','observations','scores')+FORMAT+TabSeparated" 2>&1 || echo "Not found in any DB"

          echo ""
          echo "=== Console worker pod - check if it runs CH migrations ==="
          WORKER=$(kubectl get pods -n hanzo -l app=console-worker -o name 2>/dev/null | head -1)
          if [ -n "$WORKER" ]; then
            kubectl logs "$WORKER" -n hanzo --tail=30 2>&1 | grep -i "migration\|clickhouse\|datastore\|events_core\|table" | head -10
          else
            echo "No console-worker pod found"
          fi

          echo ""
          echo "=== hanzo-datastore service endpoints ==="
          kubectl get endpoints -n hanzo hanzo-datastore 2>&1

          echo ""
          echo "=== All datastore endpoints ==="
          kubectl get endpoints -n hanzo datastore 2>&1
          kubectl get endpoints -n hanzo insights-datastore 2>&1
