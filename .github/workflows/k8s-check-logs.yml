name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Diagnose all backend services
        run: |
          echo "=== All services in hanzo namespace ==="
          kubectl get svc -n hanzo -o custom-columns='NAME:.metadata.name,TYPE:.spec.type,CLUSTER-IP:.spec.clusterIP,PORTS:.spec.ports[*].port' | head -40

          echo ""
          echo "=== All ingress rules ==="
          kubectl get ingress -n hanzo -o custom-columns='NAME:.metadata.name,HOSTS:.spec.rules[*].host' 2>/dev/null | head -20

          echo ""
          echo "=== Check agents service ==="
          kubectl get svc,deploy,pods -n hanzo | grep -i agent || echo "No agents service found"

          echo ""
          echo "=== Check compute service ==="
          kubectl get svc,deploy,pods -n hanzo | grep -i compute || echo "No compute service found"

          echo ""
          echo "=== Check KMS env vars ==="
          kubectl exec -n hanzo deploy/console -- env 2>&1 | grep -iE "KMS_|INFISICAL" | head -5

          echo ""
          echo "=== Check zap service ==="
          kubectl get svc,deploy,pods -n hanzo | grep -i zap || echo "No zap service found"

          echo ""
          echo "=== Check static/CDN ingress ==="
          kubectl get ingress -n hanzo -o yaml 2>/dev/null | grep -B2 "static.hanzo.ai\|cdn.hanzo.ai" || echo "No static/cdn ingress"

          echo ""
          echo "=== Console AGENTS_* env vars ==="
          kubectl exec -n hanzo deploy/console -- env 2>&1 | grep -iE "AGENT|BOT|PLATFORM|INFRASTRUCTURE|COMPUTE" | head -10
