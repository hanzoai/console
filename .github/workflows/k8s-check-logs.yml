name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Create events_core and events_full views
        run: |
          echo "=== Create events_core view ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 \
            --post-data="CREATE VIEW IF NOT EXISTS console.events_core AS SELECT * FROM console.observations" \
            "http://hanzo-datastore:8123/" 2>&1
          echo "Result: $?"

          echo ""
          echo "=== Create events_full view ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 \
            --post-data="CREATE VIEW IF NOT EXISTS console.events_full AS SELECT * FROM console.observations" \
            "http://hanzo-datastore:8123/" 2>&1
          echo "Result: $?"

          echo ""
          echo "=== Verify tables exist ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 \
            "http://hanzo-datastore:8123/?database=console&query=SHOW+TABLES" 2>&1

          echo ""
          echo "=== Test events_core query ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 \
            "http://hanzo-datastore:8123/?database=console&query=SELECT+count(*)+FROM+events_core+WHERE+project_id='d444910c-426e-4a0b-9041-a6eefd6fd53d'" 2>&1

          echo ""
          echo "=== Restart console pods ==="
          kubectl rollout restart deploy/console -n hanzo 2>&1
          kubectl rollout restart deploy/console-worker -n hanzo 2>&1 || true
          kubectl rollout status deploy/console -n hanzo --timeout=180s 2>&1 || echo "Timed out (continuing)"
