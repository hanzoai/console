name: Check Console Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Get crash details from terminated container
        run: |
          echo "=== Container last state ==="
          kubectl get pod datastore-0 -n hanzo -o jsonpath='{.status.containerStatuses[0].lastState}' 2>&1 | python3 -m json.tool 2>/dev/null || \
          kubectl get pod datastore-0 -n hanzo -o jsonpath='{.status.containerStatuses[0].lastState}' 2>&1

          echo ""
          echo "=== Container state ==="
          kubectl get pod datastore-0 -n hanzo -o jsonpath='{.status.containerStatuses[0].state}' 2>&1 | python3 -m json.tool 2>/dev/null || \
          kubectl get pod datastore-0 -n hanzo -o jsonpath='{.status.containerStatuses[0].state}' 2>&1

          echo ""
          echo "=== Resource requests/limits ==="
          kubectl get pod datastore-0 -n hanzo -o jsonpath='{.spec.containers[0].resources}' 2>&1 | python3 -m json.tool 2>/dev/null || echo "No resources set"

          echo ""
          echo "=== Image used ==="
          kubectl get pod datastore-0 -n hanzo -o jsonpath='{.spec.containers[0].image}' 2>&1

          echo ""
          echo "=== Previous logs (full) ==="
          kubectl logs datastore-0 -n hanzo --previous 2>&1

          echo ""
          echo "=== StatefulSet spec ==="
          kubectl get statefulset datastore -n hanzo -o yaml 2>&1 | head -80

          echo ""
          echo "=== PVC status ==="
          kubectl get pvc -n hanzo | grep datastore

          echo ""
          echo "=== ConfigMap content ==="
          kubectl get configmap datastore-config -n hanzo -o yaml 2>&1 | head -60

          echo ""
          echo "=== Node memory pressure ==="
          kubectl describe node runner-pool-32g-hwvq3 2>/dev/null | grep -E "MemoryPressure|memory|Allocatable" | head -5
