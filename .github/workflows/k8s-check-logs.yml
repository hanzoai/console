name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Get events.filterOptions error
        run: |
          POD=$(kubectl get pods -n hanzo -l app=console -o name | head -1)
          kubectl logs "$POD" -n hanzo --tail=100 2>&1 | grep -B1 -A3 "events.filterOptions\|events\.filter\|UNKNOWN_IDENTIFIER\|cannot be parsed\|DB::Exception" | head -15
