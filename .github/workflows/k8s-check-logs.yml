name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Get events.all errors
        run: |
          echo "=== Latest errors from all pods ==="
          for POD in $(kubectl get pods -n hanzo -l app=console -o name | head -2); do
            echo "--- $POD ---"
            kubectl logs "$POD" -n hanzo --tail=50 2>&1 | grep -i "events.all\|UNKNOWN_IDENTIFIER\|cannot be resolved\|DB::Exception" | head -3
          done
          
          echo ""
          echo "=== Current events_core columns ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 \
            "http://hanzo-datastore:8123/?database=console&query=DESCRIBE+events_core+FORMAT+TabSeparated" 2>&1 | awk '{print $1}'
