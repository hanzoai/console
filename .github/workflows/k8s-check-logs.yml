name: Check Console Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Force deploy new image
        run: |
          echo "=== Current pods and images ==="
          kubectl get pods -n hanzo -l app=console -o custom-columns='NAME:.metadata.name,IMAGE:.spec.containers[0].image,AGE:.metadata.creationTimestamp'

          echo ""
          echo "=== Scale to 0 then back up with new image ==="
          kubectl scale deploy/console -n hanzo --replicas=0
          sleep 10

          echo "=== Verify image is set ==="
          kubectl get deploy console -n hanzo -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""

          echo "=== Scale back up ==="
          kubectl scale deploy/console -n hanzo --replicas=2
          kubectl rollout status deploy/console -n hanzo --timeout=180s || echo "Timed out"

          echo ""
          echo "=== New pods ==="
          kubectl get pods -n hanzo -l app=console -o custom-columns='NAME:.metadata.name,IMAGE:.spec.containers[0].image,READY:.status.containerStatuses[0].ready'

          echo ""
          echo "=== Test environmentFilterOptions from new pod ==="
          sleep 10
          POD=$(kubectl get pods -n hanzo -l app=console -o name | head -1)
          kubectl logs "$POD" -n hanzo --tail=10 2>&1 | grep -i "error\|environmentFilter" || echo "No errors"
