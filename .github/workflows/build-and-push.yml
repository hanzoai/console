name: Docker Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/${{ github.repository_owner }}/console
      dockerfile: web/Dockerfile
      build-args: |
        NEXT_PUBLIC_BUILD_ID=${{ github.sha }}
        NEXT_PUBLIC_HANZO_CLOUD_REGION=US
      deploy: true
      deploy-deployment: console-web
      deploy-namespace: hanzo
    secrets: inherit

  worker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/${{ github.repository_owner }}/console-worker
      dockerfile: worker/Dockerfile
    secrets: inherit
